windowrule = suppress_event maximize, match:class .*
windowrule = center on, match:float true

# Rofi: floating, centered
windowrule = float on, match:class ^(Rofi)$
windowrule = center on, match:class ^(Rofi)$

# clipse: floating clipboard picker
windowrule = float on, match:class ^(clipse)$
windowrule = center on, match:class ^(clipse)$
windowrule = size 820 560, match:class ^(clipse)$
windowrule = rounding 14, match:class ^(clipse)$
windowrule = pin on, match:class ^(clipse)$

# UI scale picker
windowrule = float on, match:class ^(hypr-scale)$
windowrule = center on, match:class ^(hypr-scale)$
windowrule = size 380 120, match:class ^(hypr-scale)$
windowrule = rounding 12, match:class ^(hypr-scale)$
windowrule = pin on, match:class ^(hypr-scale)$

workspace = 1, persistent:true
workspace = 2, persistent:true
workspace = 3, persistent:true
workspace = 4, persistent:true
workspace = 5, persistent:true
workspace = 6, persistent:true
workspace = 7, persistent:true
workspace = 8, persistent:true
workspace = 9, persistent:true
workspace = 10, persistent:true

windowrule = float on, match:class ^(org\.pulseaudio\.pavucontrol|nm-connection-editor|blueman-manager|AmneziaVPN)$
windowrule = center on, match:class ^(org\.pulseaudio\.pavucontrol|nm-connection-editor|blueman-manager|AmneziaVPN)$
windowrule = size 900 620, match:class ^(org\.pulseaudio\.pavucontrol|nm-connection-editor|blueman-manager)$

