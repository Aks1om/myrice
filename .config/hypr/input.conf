input {
  kb_layout = us,ru
  kb_options = grp:alt_shift_toggle,caps:escape
  follow_mouse = 1
  sensitivity = 0

  touchpad {
    natural_scroll = true
    clickfinger_behavior = true
    tap-to-click = true
    disable_while_typing = true
  }
}

gestures {
  workspace_swipe_touch = false
}

gesture = 3, horizontal, workspace
