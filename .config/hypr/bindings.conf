$terminal = ghostty
$fileManager = nemo
$menu = bash ~/.config/hypr/scripts/startmenu.sh

bind = $mainMod, T, exec, $terminal
bind = $mainMod, TAB, cyclenext
bind = $mainMod SHIFT, TAB, cyclenext, prev
bind = $mainMod, Q, killactive
bind = $mainMod SHIFT, Q, exit
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, SPACE, exec, qs ipc call launcher open
bind = $mainMod, G, togglefloating
bind = $mainMod SHIFT, V, workspaceopt, allfloat
bind = $mainMod, F, fullscreen
bind = $mainMod, V, exec, ~/.config/hypr/scripts/clipboard.sh
bind = $mainMod, N, exec, swaync-client -t -sw
bind = $mainMod SHIFT, N, exec, swaync-client -d -sw
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, exec, ~/.config/hypr/scripts/toggle-special-window.sh
bind = $mainMod ALT, S, exec, /usr/local/bin/sudo-nopasswd-toggle
bind = $mainMod, B, layoutmsg, togglesplit
bind = $mainMod, P, exec, qs ipc call display open
bind = $mainMod, F1, exec, qs ipc call keybinds open
bind = $mainMod, slash, exec, qs ipc call keybinds open
bind = $mainMod SHIFT, T, settiled
bind = $mainMod SHIFT, M, exec, ~/.local/bin/lid-mobile-toggle

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind = $mainMod, F12, exec, qs ipc call screenshot open
bind = $mainMod SHIFT, F12, exec, ~/.config/hypr/scripts/screenshot.sh output
bind = , PRINT, exec, qs ipc call screenshot open
bind = SHIFT, PRINT, exec, ~/.config/hypr/scripts/screenshot.sh output
bind = $mainMod SHIFT, W, exec, nm-connection-editor
bind = $mainMod, ESCAPE, exec, qs ipc call power open
bind = $mainMod SHIFT, ESCAPE, exec, ghostty -e btop

# UI scale (all apps, Waybar, etc. — Wayland monitor scale)
bind = $mainMod CTRL, equal, exec, ~/.config/hypr/scripts/scale.sh up
bind = $mainMod CTRL, minus, exec, ~/.config/hypr/scripts/scale.sh down
bind = $mainMod CTRL, 0, exec, ~/.config/hypr/scripts/scale.sh reset
bind = $mainMod CTRL, S, exec, qs ipc call scale open

bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86MonBrightnessUp, exec, brightnessctl set +5%
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
