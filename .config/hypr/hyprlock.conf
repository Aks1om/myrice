general {
  hide_cursor = true
}

background {
  monitor =
  path = ~/Pictures/wallpapers/default.jpg
  blur_passes = 2
  brightness = 0.75
  contrast = 0.95
}

input-field {
  monitor =
  size = 300, 50
  outline_thickness = 2
  dots_size = 0.22
  dots_spacing = 0.2
  dots_center = true
  outer_color = rgb(88c0d0)
  inner_color = rgb(2e3440)
  font_color = rgb(e5e9f0)
  fade_on_empty = false
  placeholder_text = Password...
  hide_input = false
  position = 0, -80
  halign = center
  valign = center
}

label {
  monitor =
  text = cmd[update:1000] echo "$TIME"
  color = rgb(e5e9f0)
  font_size = 72
  font_family = JetBrainsMono Nerd Font
  position = 0, 90
  halign = center
  valign = center
}

label {
  monitor =
  text = cmd[update:60000] date +"%A, %d %B"
  color = rgb(d8dee9)
  font_size = 18
  font_family = JetBrainsMono Nerd Font
  position = 0, 30
  halign = center
  valign = center
}
