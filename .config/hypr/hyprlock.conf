$font = Inter Display

general {
  hide_cursor = true
  ignore_empty_input = true
  text_trim = true
}

background {
  monitor =
  path = ~/Pictures/wallpapers/mountain-bw.jpg
  blur_passes = 3
  blur_size = 6
  brightness = 0.55
  contrast = 1.0
  vibrancy = 0.15
  vibrancy_darkness = 0.05
}

# TIME — upper third
label {
  monitor =
  text = <span weight="500">$TIME</span>
  color = rgba(255, 255, 255, 1.0)
  font_size = 120
  font_family = $font

  position = 0, -20%
  halign = center
  valign = top
}

# DATE — under time
label {
  monitor =
  text = cmd[update:60000] date +"%A, %d %B"
  color = rgba(220, 220, 220, 0.85)
  font_size = 22
  font_family = Inter

  position = 0, -32%
  halign = center
  valign = top
}

# USERNAME — above input field, around screen mid-line
label {
  monitor =
  text = <span weight="500">$USER</span>
  color = rgba(255, 255, 255, 1.0)
  font_size = 20
  font_family = Inter

  position = 0, 48%
  halign = center
  valign = bottom
}

# PASSWORD input — slightly above center
input-field {
  monitor =
  size = 10%, 3%
  outline_thickness = 1
  dots_size = 0.18
  dots_spacing = 0.32
  dots_center = true

  outer_color = rgba(255, 255, 255, 0.18)
  inner_color = rgba(20, 20, 25, 0.55)
  font_color = rgba(255, 255, 255, 1.0)
  font_family = Inter

  fade_on_empty = false
  rounding = 22
  placeholder_text = <span weight="400">Введите пароль</span>
  hide_input = false

  check_color = rgba(180, 180, 255, 0.85)
  fail_color = rgba(255, 138, 162, 0.85)

  position = 0, 42%
  halign = center
  valign = bottom
}
