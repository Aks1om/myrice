general {
  hide_cursor = true
}

background {
  monitor =
  color = rgba(0, 0, 0, 1.0)
}

input-field {
  monitor =
  size = 300, 50
  outline_thickness = 2
  dots_size = 0.22
  dots_spacing = 0.2
  dots_center = true
  outer_color = rgb(ffffff)
  inner_color = rgb(050505)
  font_color = rgb(ffffff)
  fade_on_empty = false
  placeholder_text = Password...
  hide_input = false
  position = 0, -80
  halign = center
  valign = center
}

label {
  monitor =
  text = cmd[update:1000] echo "$TIME"
  color = rgb(ffffff)
  font_size = 72
  font_family = JetBrainsMono Nerd Font
  position = 0, 90
  halign = center
  valign = center
}

label {
  monitor =
  text = cmd[update:60000] date +"%A, %d %B"
  color = rgb(a0a0a0)
  font_size = 18
  font_family = JetBrainsMono Nerd Font
  position = 0, 30
  halign = center
  valign = center
}
