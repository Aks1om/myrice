add_newline = true

format = "$directory$git_branch$git_status$cmd_duration$line_break$character"

[character]
success_symbol = "[>](bold green)"
error_symbol = "[>](bold red)"

[directory]
style = "bold cyan"
truncation_length = 4
truncate_to_repo = true

[git_branch]
symbol = "git:"
style = "bold purple"

[git_status]
style = "bold yellow"

[cmd_duration]
min_time = 800
format = " took [$duration](bold blue)"
